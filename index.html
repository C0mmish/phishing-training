const typeColors = {

  sms: { bg: "#1a4731", accent: "#22c55e", light: "#dcfce7", icon: "💬" },
  voice: { bg: "#4a1942", accent: "#a855f7", light: "#f3e8ff", icon: "📞" },
};

function LinkRenderer({ text }) {
  const [hoveredLink, setHoveredLink] = useState(null);
  const [tooltipPos, setTooltipPos] = useState({ x: 0, y: 0 });

  const parts = text.split(/(<a[^>]*>.*?<\/a>)/g);

  return (
    <>
      {parts.map((part, i) => {
        const match = part.match(/<a href="([^"]*)"(?: data-real="([^"]*)")?>(.*?)<\/a>/);
        if (match) {
          const [, displayUrl, realUrl, linkText] = match;
          const destination = realUrl || displayUrl;
          return (
            <span key={i} style={{ position: "relative", display: "inline" }}>
              <span
                onMouseEnter={(e) => {
                  const rect = e.target.getBoundingClientRect();
                  setHoveredLink(i);
                  setTooltipPos({ x: rect.left, y: rect.bottom + 8 });
                }}
                onMouseLeave={() => setHoveredLink(null)}
                style={{
                  color: "#3b82f6",
                  textDecoration: "underline",
                  cursor: "pointer",
                  borderBottom: "2px dashed #3b82f6",
                  paddingBottom: 1,
                }}
              >
                {linkText}
              </span>
              {hoveredLink === i && (
                <span
                  style={{
                    position: "fixed",
                    left: Math.min(tooltipPos.x, window.innerWidth - 420),
                    top: tooltipPos.y,
                    background: "#1e293b",
                    color: "#e2e8f0",
                    padding: "8px 12px",
                    borderRadius: 6,
                    fontSize: 13,
                    zIndex: 9999,
                    maxWidth: 400,
                    boxShadow: "0 4px 16px rgba(0,0,0,0.35)",
                    border: "1px solid #334155",
                    lineHeight: 1.5,
                    fontFamily: "monospace",
                  }}
                >
                  <div style={{ wordBreak: "break-all" }}>{destination}</div>
                </span>
              )}
            </span>
          );
        }
        return <span key={i}>{part}</span>;
      })}
    </>
  );
}

function MessageCard({ scenario, revealed }) {
  const colors = typeColors[scenario.type];
  const isEmail = scenario.type === "email";
  const isSms = scenario.type === "sms";
  const isVoice = scenario.type === "voice";

  return (
    <div style={{
      background: "#fff",
      borderRadius: 12,
      border: "1px solid #e2e8f0",
      overflow: "hidden",
      boxShadow: "0 1px 3px rgba(0,0,0,0.06)",
    }}>
      <div style={{ background: colors.bg, padding: "10px 20px", display: "flex", alignItems: "center", gap: 10 }}>
        <span style={{ fontSize: 20 }}>{colors.icon}</span>
        <span style={{ color: "#fff", fontWeight: 700, fontSize: 14, letterSpacing: 1, textTransform: "uppercase" }}>
          {scenario.typeLabel}
        </span>
        {revealed && (
          <span style={{
            marginLeft: "auto",
            background: scenario.isPhishing ? "#dc2626" : "#16a34a",
            color: "#fff",
            padding: "4px 14px",
            borderRadius: 20,
            fontSize: 13,
            fontWeight: 700,
          }}>
            {scenario.isPhishing ? "🎣 PHISHING" : "✓ LEGITIMATE"}
          </span>
        )}
      </div>

      <div style={{ padding: "16px 20px" }}>
        {isEmail && (
          <div style={{ marginBottom: 14, fontSize: 13, color: "#64748b", lineHeight: 1.8 }}>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 4, alignItems: "center" }}>
              <strong style={{ color: "#334155" }}>From:</strong>
              <LinkRenderer text={scenario.from} />
              {revealed && scenario.fromNote && (

                }}>⚠️ {scenario.fromNote}</span>
              )}
            </div>
            <div><strong style={{ color: "#334155" }}>To:</strong> {scenario.to}</div>
            <div><strong style={{ color: "#334155" }}>Subject:</strong> {scenario.subject}</div>
            <hr style={{ border: "none", borderTop: "1px solid #e2e8f0", margin: "10px 0" }} />
          </div>
        )}

        {isSms && (

            <div><strong style={{ color: "#334155" }}>From:</strong> {scenario.from}</div>
            <hr style={{ border: "none", borderTop: "1px solid #e2e8f0", margin: "10px 0" }} />
          </div>
        )}

        {isVoice && (
          <div style={{ marginBottom: 14, fontSize: 13, color: "#64748b" }}>
            <div><strong style={{ color: "#334155" }}>Caller:</strong> {scenario.from}</div>
            <hr style={{ border: "none", borderTop: "1px solid #e2e8f0", margin: "10px 0" }} />
          </div>
        )}

        <div style={{
          fontSize: 14, lineHeight: 1.75, color: "#1e293b", whiteSpace: "pre-wrap",
          fontFamily: isVoice ? "Georgia, serif" : isSms ? "system-ui" : "Segoe UI, system-ui, sans-serif",
          fontStyle: isVoice ? "italic" : "normal",
          background: isSms ? "#f0fdf4" : isVoice ? "#faf5ff" : "transparent",
          padding: isSms || isVoice ? 16 : 0,
          borderRadius: isSms || isVoice ? 10 : 0,
        }}>
          <LinkRenderer text={scenario.body} />
        </div>

        {(isEmail || isSms) && (
          <div style={{

}

      }}>
        <div style={{ textAlign: "center", maxWidth: 480, width: "100%" }}>
          <div style={{ fontSize: 56, marginBottom: 12 }}>🎣</div>
          <h1 style={{ color: "#f8fafc", fontSize: 32, fontWeight: 800, margin: "0 0 6px 0", letterSpacing: -1 }}>
            Don't Take the Bait
          </h1>
          <p style={{ color: "#94a3b8", fontSize: 16, margin: "0 0 6px 0" }}>
            Interactive Phishing Identification Training
          </p>
          <p style={{ color: "#64748b", fontSize: 13, margin: "0 0 36px 0" }}>
            Presented by <strong style={{ color: "#94a3b8" }}>Black Rabbit Consulting, LLC</strong>
          </p>

          <div style={{
            background: "rgba(255,255,255,0.04)",
            border: "1px solid rgba(255,255,255,0.1)",
            borderRadius: 16, padding: "32px 28px", textAlign: "left",
          }}>
            <p style={{ color: "#cbd5e1", fontSize: 14, margin: "0 0 24px 0", textAlign: "center", lineHeight: 1.6 }}>
              Enter your details below. They'll be used to personalize the phishing
              scenarios — just like a real attacker would.
            </p>

            <label style={{ color: "#94a3b8", fontSize: 12, fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase", display: "block", marginBottom: 6 }}>
              Your Full Name
            </label>
            <input
              type="text" value={userName}
              onChange={(e) => setUserName(e.target.value)}
              placeholder="e.g. Jane Smith"
              style={{
                width: "100%", padding: "12px 16px",
                background: "rgba(255,255,255,0.06)",
                border: "1px solid rgba(255,255,255,0.15)",
                borderRadius: 10, color: "#f1f5f9", fontSize: 15,
                outline: "none", marginBottom: 20, boxSizing: "border-box",
              }}
              onFocus={(e) => e.target.style.borderColor = "#3b82f6"}
              onBlur={(e) => e.target.style.borderColor = "rgba(255,255,255,0.15)"}
            />

            <label style={{ color: "#94a3b8", fontSize: 12, fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase", display: "block", marginBottom: 6 }}>
              Your Work Email
            </label>
            <input
              type="email" value={userEmail}
              onChange={(e) => setUserEmail(e.target.value)}
              placeholder="e.g. jsmith@hccao.org"
              style={{
                width: "100%", padding: "12px 16px",
                background: "rgba(255,255,255,0.06)",
                border: "1px solid rgba(255,255,255,0.15)",
                borderRadius: 10, color: "#f1f5f9", fontSize: 15,
                outline: "none", marginBottom: 28, boxSizing: "border-box",
              }}
              onFocus={(e) => e.target.style.borderColor = "#3b82f6"}
              onBlur={(e) => e.target.style.borderColor = "rgba(255,255,255,0.15)"}
            />

            <button
              onClick={() => { if (userName.trim() && userEmail.trim()) setSetupDone(true); }}
              disabled={!userName.trim() || !userEmail.trim()}
              style={{
                width: "100%",
                background: userName.trim() && userEmail.trim()
                  ? "linear-gradient(135deg, #3b82f6, #2563eb)" : "rgba(255,255,255,0.08)",
                color: userName.trim() && userEmail.trim() ? "#fff" : "#64748b",
                border: "none", padding: "14px 24px", borderRadius: 10,
                fontSize: 16, fontWeight: 700,
                cursor: userName.trim() && userEmail.trim() ? "pointer" : "default",
                transition: "all 0.2s",
              }}
            >
              Continue →
            </button>
          </div>
        </div>
      </div>
    );
  }

  if (!started) {
    return (
      <div style={{
        minHeight: "100vh",
        background: "linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%)",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontFamily: "'Segoe UI', system-ui, sans-serif", padding: 20,
      }}>
        <div style={{ textAlign: "center", maxWidth: 640 }}>
          <div style={{ fontSize: 64, marginBottom: 16 }}>🎣</div>
          <h1 style={{ color: "#f8fafc", fontSize: 36, fontWeight: 800, margin: "0 0 8px 0", letterSpacing: -1 }}>
            Welcome, {userName.split(" ")[0]}
          </h1>
          <p style={{ color: "#94a3b8", fontSize: 16, margin: "0 0 32px 0", lineHeight: 1.6 }}>
            The scenarios ahead will use <strong style={{ color: "#e2e8f0" }}>your name and email</strong> — just
            like a real phishing attack would. Some use advanced tricks like domain spoofing
            and text substitution that are extremely hard to spot.
          </p>
          <div style={{ display: "flex", gap: 16, justifyContent: "center", marginBottom: 32, flexWrap: "wrap" }}>
            {[
              { icon: "📧", label: "Email", count: scenarios.filter(s => s.type === "email").length },
              { icon: "💬", label: "SMS", count: scenarios.filter(s => s.type === "sms").length },
              { icon: "📞", label: "Voice", count: scenarios.filter(s => s.type === "voice").length },
            ].map((t) => (
              <div key={t.label} style={{
                background: "rgba(255,255,255,0.05)",
                border: "1px solid rgba(255,255,255,0.1)",
                borderRadius: 12, padding: "14px 24px", textAlign: "center",
              }}>
                <div style={{ fontSize: 24 }}>{t.icon}</div>
                <div style={{ color: "#e2e8f0", fontSize: 14, fontWeight: 600 }}>{t.count} {t.label}</div>
              </div>
            ))}
          </div>
          <p style={{ color: "#94a3b8", fontSize: 15, marginBottom: 32, lineHeight: 1.7 }}>
            You'll see <strong style={{ color: "#e2e8f0" }}>{scenarios.length} messages</strong> — some real, some phishing.
            <br />For each one, decide: <strong style={{ color: "#ef4444" }}>Phishing</strong> or <strong style={{ color: "#22c55e" }}>Not Phishing</strong>?
          </p>
          <button
            onClick={() => setStarted(true)}
            style={{
              background: "linear-gradient(135deg, #3b82f6, #2563eb)",
              color: "#fff", border: "none", padding: "16px 48px",
              borderRadius: 12, fontSize: 18, fontWeight: 700, cursor: "pointer",
              boxShadow: "0 4px 20px rgba(59,130,246,0.4)",
              transition: "transform 0.15s, box-shadow 0.15s",
            }}
            onMouseEnter={(e) => { e.target.style.transform = "translateY(-2px)"; e.target.style.boxShadow = "0 6px 28px rgba(59,130,246,0.5)"; }}
            onMouseLeave={(e) => { e.target.style.transform = ""; e.target.style.boxShadow = "0 4px 20px rgba(59,130,246,0.4)"; }}
          >
            Begin Training →
          </button>
        </div>
      </div>
    );
  }

  if (showSummary) {
    return (
      <div style={{
        minHeight: "100vh",
        background: "linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%)",
        fontFamily: "'Segoe UI', system-ui, sans-serif", padding: 20,
      }}>
        <div style={{ maxWidth: 720, margin: "0 auto", paddingTop: 40 }}>
          <div style={{ textAlign: "center", marginBottom: 40 }}>
            <div style={{ fontSize: 56, marginBottom: 8 }}>📊</div>
            <h2 style={{ color: "#f8fafc", fontSize: 32, margin: "0 0 4px 0" }}>Results for {userName}</h2>
            <p style={{ color: "#64748b", fontSize: 13, margin: "0 0 16px 0" }}>{userEmail}</p>
            <div style={{
              display: "inline-block",
              background: totalCorrect >= 8 ? "rgba(34,197,94,0.15)" : totalCorrect >= 5 ? "rgba(234,179,8,0.15)" : "rgba(239,68,68,0.15)",
              border: `2px solid ${totalCorrect >= 8 ? "#22c55e" : totalCorrect >= 5 ? "#eab308" : "#ef4444"}`,
              borderRadius: 16, padding: "20px 40px", marginTop: 8,
            }}>
              <div style={{ color: "#f8fafc", fontSize: 48, fontWeight: 800 }}>{totalCorrect}/{scenarios.length}</div>
              <div style={{ color: "#94a3b8", fontSize: 15 }}>Correct Answers</div>
            </div>
          </div>

          {scenarios.map((s) => {
            const userAnswer = answers[s.id];
            const correct = userAnswer === s.isPhishing;
            const summaryLabel = s.type === "email" ? s.subject : s.typeLabel + " from " + s.from.replace(/<[^>]*>/g, "").split("—")[0].trim();
            return (
              <div key={s.id} style={{
                background: "rgba(255,255,255,0.03)",
                border: `1px solid ${correct ? "rgba(34,197,94,0.3)" : "rgba(239,68,68,0.3)"}`,
                borderRadius: 10, padding: "14px 20px", marginBottom: 10,
                display: "flex", alignItems: "center", gap: 14,
              }}>
                <span style={{ fontSize: 22 }}>{correct ? "✅" : "❌"}</span>
                <span style={{ fontSize: 18 }}>{typeColors[s.type].icon}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ color: "#e2e8f0", fontSize: 14, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                    {summaryLabel}
                  </div>
                  <div style={{ color: "#64748b", fontSize: 12 }}>
                    {s.isPhishing ? "Phishing" : "Legitimate"} — You said: {userAnswer ? "Phishing" : "Not Phishing"}
                  </div>
                </div>
              </div>
            );
          })}

          <div style={{
            marginTop: 32, background: "rgba(239,68,68,0.06)",
            border: "1px solid rgba(239,68,68,0.2)", borderRadius: 12, padding: 24, marginBottom: 16,
          }}>
            <h3 style={{ color: "#fca5a5", margin: "0 0 12px 0", fontSize: 17 }}>🔍 Advanced Tricks Used in This Training</h3>
            <div style={{ color: "#cbd5e1", fontSize: 13, lineHeight: 1.8 }}>
              <p style={{ margin: "0 0 10px 0" }}>
                <strong style={{ color: "#f8fafc" }}>Text substitution ('rn' → 'm'):</strong> The letters 'r' and 'n' placed together look like 'm' in many fonts. 'rnicrosoft.com' reads as 'microsoft.com' at a glance.
              </p>
              <p style={{ margin: "0 0 10px 0" }}>
                <strong style={{ color: "#f8fafc" }}>Foreign domain tricks:</strong> Unexpected country-code domains like .jp or .ru in sender addresses are a major red flag when the organization they claim to be is based in another country.
              </p>
              <p style={{ margin: "0 0 10px 0" }}>
                <strong style={{ color: "#f8fafc" }}>Sender address spoofing:</strong> The displayed 'From' address can be forged to show an internal address while actually sending from an external domain. Always hover over sender addresses to inspect the real domain.
              </p>
              <p style={{ margin: 0 }}>
                <strong style={{ color: "#f8fafc" }}>Subdomain deception:</strong> Attackers place a trusted name as a subdomain (e.g., 'hccao.org.evil-site.net'). The real domain is always the last part before the first single slash.
              </p>
            </div>
          </div>

          <div style={{
            background: "rgba(59,130,246,0.08)",
            border: "1px solid rgba(59,130,246,0.2)", borderRadius: 12, padding: 24,
          }}>
            <h3 style={{ color: "#93c5fd", margin: "0 0 12px 0", fontSize: 17 }}>🔑 Key Takeaways</h3>
            <div style={{ color: "#cbd5e1", fontSize: 13, lineHeight: 1.8 }}>
              <p style={{ margin: "0 0 10px 0" }}>
                <strong style={{ color: "#f8fafc" }}>Always hover before you click.</strong> Inspect both links AND sender email addresses. The displayed text may not match the real destination.
              </p>
              <p style={{ margin: "0 0 10px 0" }}>
                <strong style={{ color: "#f8fafc" }}>Inspect domains character by character.</strong> 'rn/m' tricks and foreign domain codes are nearly invisible. When in doubt, type the URL manually.
              </p>
              <p style={{ margin: "0 0 10px 0" }}>
                <strong style={{ color: "#f8fafc" }}>Personalization doesn't mean it's safe.</strong> Attackers use your name, email, and employer from public sources and data breaches.
              </p>
              <p style={{ margin: 0 }}>
                <strong style={{ color: "#f8fafc" }}>Verify through known channels.</strong> If you receive a suspicious message, contact the sender using a number or address you already trust.
              </p>
            </div>
          </div>

          <div style={{ textAlign: "center", marginTop: 32, paddingBottom: 40 }}>
            <button
              onClick={() => {
                setAnswers({}); setRevealed({}); setCurrentIndex(0);
                setShowSummary(false); setExpandedClue(null);
                setStarted(false); setSetupDone(false);
                setUserName(""); setUserEmail("");
              }}
              style={{
                background: "linear-gradient(135deg, #3b82f6, #2563eb)",
                color: "#fff", border: "none", padding: "14px 36px",
                borderRadius: 10, fontSize: 16, fontWeight: 700, cursor: "pointer",
              }}
            >
              Restart for Next Participant
            </button>
            <p style={{ color: "#475569", fontSize: 12, marginTop: 16 }}>
              Black Rabbit Consulting, LLC — Phishing Awareness Training
            </p>
          </div>
        </div>
      </div>
    );
  }

  const hasAnswered = answers[scenario.id] !== undefined;
  const isRevealed = revealed[scenario.id];
  const isCorrect = hasAnswered && answers[scenario.id] === scenario.isPhishing;

  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%)",
      fontFamily: "'Segoe UI', system-ui, sans-serif", padding: 20,
    }}>
      <div style={{ maxWidth: 800, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
          <span style={{ color: "#94a3b8", fontSize: 13, fontWeight: 600, whiteSpace: "nowrap" }}>
            {currentIndex + 1} / {scenarios.length}
          </span>
          <div style={{ flex: 1, height: 6, background: "rgba(255,255,255,0.08)", borderRadius: 3 }}>
            <div style={{
              width: `${((currentIndex + 1) / scenarios.length) * 100}%`,
              height: "100%",
              background: "linear-gradient(90deg, #3b82f6, #8b5cf6)",
              borderRadius: 3, transition: "width 0.4s ease",
            }} />
          </div>
          <span style={{ color: "#64748b", fontSize: 12, whiteSpace: "nowrap" }}>
            {userName.split(" ")[0]} — {totalCorrect}/{Object.keys(answers).length} correct
          </span>
        </div>

        <div style={{ display: "flex", gap: 6, marginBottom: 20, justifyContent: "center", flexWrap: "wrap" }}>
          {scenarios.map((s, i) => (
            <button
              key={s.id}
              onClick={() => { setCurrentIndex(i); setExpandedClue(null); }}
              style={{
                width: 32, height: 32, borderRadius: 8,
                border: i === currentIndex ? "2px solid #3b82f6" : "1px solid rgba(255,255,255,0.1)",
                background: answers[s.id] !== undefined
                  ? (answers[s.id] === s.isPhishing ? "rgba(34,197,94,0.2)" : "rgba(239,68,68,0.2)")
                  : "rgba(255,255,255,0.04)",
                color: i === currentIndex ? "#3b82f6" : "#94a3b8",
                cursor: "pointer", fontSize: 13, fontWeight: 600,
                display: "flex", alignItems: "center", justifyContent: "center",
              }}
            >
              {i + 1}
            </button>
          ))}
        </div>

        <MessageCard scenario={scenario} revealed={isRevealed} />

        {!hasAnswered && (
          <div style={{ display: "flex", gap: 16, marginTop: 24, justifyContent: "center" }}>
            <button
              onClick={() => {
                setAnswers({ ...answers, [scenario.id]: true });
                setRevealed({ ...revealed, [scenario.id]: true });
              }}
              style={{
                flex: 1, maxWidth: 220, padding: "16px 24px",
                background: "linear-gradient(135deg, #dc2626, #b91c1c)",
                color: "#fff", border: "none", borderRadius: 12,
                fontSize: 17, fontWeight: 700, cursor: "pointer",
                boxShadow: "0 4px 16px rgba(220,38,38,0.3)",
                transition: "transform 0.15s",
              }}
              onMouseEnter={(e) => e.target.style.transform = "translateY(-2px)"}
              onMouseLeave={(e) => e.target.style.transform = ""}
            >
              🎣 Phishing
            </button>
            <button
              onClick={() => {
                setAnswers({ ...answers, [scenario.id]: false });
                setRevealed({ ...revealed, [scenario.id]: true });
              }}
              style={{
                flex: 1, maxWidth: 220, padding: "16px 24px",
                background: "linear-gradient(135deg, #16a34a, #15803d)",
                color: "#fff", border: "none", borderRadius: 12,
                fontSize: 17, fontWeight: 700, cursor: "pointer",
                boxShadow: "0 4px 16px rgba(22,163,74,0.3)",
                transition: "transform 0.15s",
              }}
              onMouseEnter={(e) => e.target.style.transform = "translateY(-2px)"}
              onMouseLeave={(e) => e.target.style.transform = ""}
            >
              ✓ Not Phishing
            </button>
          </div>
        )}

        {hasAnswered && (
          <div style={{
            marginTop: 24, padding: 20, borderRadius: 12,
            background: isCorrect ? "rgba(34,197,94,0.1)" : "rgba(239,68,68,0.1)",
            border: `2px solid ${isCorrect ? "#22c55e" : "#ef4444"}`,
          }}>
            <div style={{
              color: isCorrect ? "#4ade80" : "#f87171",
              fontSize: 20, fontWeight: 800, marginBottom: 8,
            }}>
              {isCorrect ? "✅ Correct!" : "❌ Not quite!"}
            </div>
            <div style={{ color: "#cbd5e1", fontSize: 14, marginBottom: 16 }}>
              This message is <strong style={{ color: "#f8fafc" }}>{scenario.isPhishing ? "PHISHING" : "LEGITIMATE"}</strong>.
              {!isCorrect && (scenario.isPhishing
                ? " This was a phishing attempt designed to trick you. Here's what to look for:"
                : " This was actually a safe, legitimate message. Here's why:"
              )}
              {isCorrect && " Here are the signs that helped identify it:"}
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {scenario.clues.map((clue, i) => (
                <div key={i} style={{
                  background: "rgba(255,255,255,0.04)",
                  borderRadius: 8, border: "1px solid rgba(255,255,255,0.08)",
                  overflow: "hidden",
                }}>
                  <button
                    onClick={() => setExpandedClue(expandedClue === i ? null : i)}
                    style={{
                      width: "100%", padding: "12px 16px",
                      background: "none", border: "none",
                      color: "#e2e8f0", fontSize: 14, fontWeight: 600,
                      cursor: "pointer", display: "flex",
                      alignItems: "center", gap: 10, textAlign: "left",
                    }}
                  >
                    <span style={{
                      display: "inline-flex", alignItems: "center", justifyContent: "center",
                      width: 24, height: 24, borderRadius: 6,
                      background: scenario.isPhishing ? "rgba(239,68,68,0.15)" : "rgba(34,197,94,0.15)",
                      color: scenario.isPhishing ? "#f87171" : "#4ade80",
                      fontSize: 12, fontWeight: 800, flexShrink: 0,
                    }}>
                      {i + 1}
                    </span>
                    <span style={{ flex: 1 }}>{clue.label}</span>
                    <span style={{ color: "#64748b", fontSize: 18, transition: "transform 0.2s", transform: expandedClue === i ? "rotate(180deg)" : "" }}>▾</span>
                  </button>
                  {expandedClue === i && (
                    <div style={{
                      padding: "0 16px 14px 50px",
                      color: "#94a3b8", fontSize: 13, lineHeight: 1.7,
                    }}>
                      {clue.detail}
                    </div>
                  )}
                </div>
              ))}
            </div>

            <div style={{ textAlign: "center", marginTop: 20 }}>
              {currentIndex < scenarios.length - 1 ? (
                <button
                  onClick={() => { setCurrentIndex(currentIndex + 1); setExpandedClue(null); }}
                  style={{
                    background: "linear-gradient(135deg, #3b82f6, #2563eb)",
                    color: "#fff", border: "none", padding: "14px 36px",
                    borderRadius: 10, fontSize: 16, fontWeight: 700, cursor: "pointer",
                  }}
                >
                  Next Message →
                </button>
              ) : (
                <button
                  onClick={() => setShowSummary(true)}
                  style={{
                    background: "linear-gradient(135deg, #8b5cf6, #7c3aed)",
                    color: "#fff", border: "none", padding: "14px 36px",
                    borderRadius: 10, fontSize: 16, fontWeight: 700, cursor: "pointer",
                  }}
                >
                  View Results 📊
                </button>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


ReactDOM.render(React.createElement(PhishingTrainingDemo), document.getElementById("root"));
</script>
</body>
</html>
